<script>
let progreso = 10;
let totalArchivos = 25343;
let archivoActual = 0;

let velocidadBase = 6 + Math.random() * 4;
let velocidadActual = velocidadBase;

// 🎬 FUNCIÓN PRINCIPAL
function animar() {
  const estado = document.getElementById("estado");
  const barra = document.getElementById("barra");
  const porcentaje = document.getElementById("porcentaje");
  const extra = document.getElementById("extra");
  const contador = document.getElementById("contador");

  if (progreso < 100) {

    // 🔥 Variación controlada
    velocidadActual += (Math.random() - 0.5) * 0.25;
    velocidadActual = Math.max(4, Math.min(12, velocidadActual));

    // 📦 Progreso dinámico
    let archivosPorTick = Math.floor(velocidadActual * 25);

    // 🧠 Simular “atasco” en 99% (realismo)
    if (progreso > 95 && Math.random() < 0.15) {
      archivosPorTick *= 0.2;
    }

    archivoActual += archivosPorTick;
    if (archivoActual > totalArchivos) archivoActual = totalArchivos;

    progreso = (archivoActual / totalArchivos) * 100;

    // ⏱️ Tiempo estimado
    let archivosRestantes = totalArchivos - archivoActual;
    let tiempoSegundos = archivosRestantes / (archivosPorTick * (1000 / 40));
    let tiempoMin = Math.max(1, Math.floor(tiempoSegundos / 60));

    // 🧠 Estados
    if (progreso < 10) estado.innerText = "Inicializando conexión...";
    else if (progreso < 30) estado.innerText = "Conectando con servidor...";
    else if (progreso < 50) estado.innerText = "Autenticando credenciales...";
    else if (progreso < 75) estado.innerText = "Copiando archivos del sistema...";
    else if (progreso < 95) estado.innerText = "Extrayendo datos sensibles...";
    else estado.innerText = "Finalizando transferencia...";

    // 🎨 UI
    barra.style.width = progreso + "%";
    porcentaje.innerText = Math.floor(progreso) + "%";
    contador.innerText = archivoActual.toLocaleString() + " / " + totalArchivos.toLocaleString() + " archivos";
    extra.innerText = velocidadActual.toFixed(1) + " MB/s • " + tiempoMin + " min restantes";

    setTimeout(animar, 40);

  } else {
    finalizarSimulacion();
  }
}

// 🧨 LIMPIAR Y MOSTRAR MENSAJE FINAL
function finalizarSimulacion() {

  // Pequeño delay para hacerlo más creíble
  setTimeout(() => {

    // Limpiar todo el contenido anterior
    document.body.innerHTML = "";
    document.body.style.background = "black";

    showFinalMessage();

  }, 1500);
}

// 👇 TU FUNCIÓN (MEJORADA)
function showFinalMessage(){

  const message = document.createElement("div");
  message.className = "final-message";
  message.innerHTML = "⚠️ Mensaje ha sido víctima de una campaña de phishing ⚠️ <br><br>⬇️ Baje el scroll ⬇️";

  document.body.appendChild(message);

  // 🎨 Estilos dinámicos
  const style = document.createElement("style");
  style.innerHTML = `
    .final-message {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #00ffcc;
      font-size: 42px;
      font-family: Consolas, monospace;
      text-align: center;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0.3; }
      100% { opacity: 1; }
    }
  `;
  document.head.appendChild(style);
}

// 🚀 INICIAR
animar();
</script>
